title: Robert Perez
tagline: Cybersecurity Blog
description: >-
  Hands-on offensive and blue team security writeups from CTFs, lab environments,
  and home-built networks. Beginner friendly, methodology first, no flags or
  room answers.

author:
  name: Robert Perez
  github: barrytd
  linkedin: robert-perezpereda
  tryhackme: bxrry
  email: r.perezpereda01@gmail.com
  # TODO: commit the resume PDF at this exact path. The hero Resume button links
  # here unconditionally, so it will 404 until the file is added to the repo.
  resume: /assets/robert-perez-resume.pdf

url: "https://barrytd.github.io"
baseurl: ""

# Disable theme - we ship our own layouts and CSS.
theme: null

# Custom labs collection for the writeup pages.
collections:
  labs:
    output: true
    permalink: /labs/:path/

defaults:
  - scope:
      path: ""
      type: labs
    values:
      layout: lab

# Syntax highlighter shipped by GitHub Pages.
highlighter: rouge
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

permalink: /:title/
timezone: America/New_York

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
